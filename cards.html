



<!DOCTYPE html>

<html dir="rtl" lang="ar">

<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;800&display=swap" rel="stylesheet">

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width,initial-scale=1">

<title>منشئ بطاقات منطاق</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{

margin:0;

background:#f3efe9;

font-family:Tahoma;

}
@media print{

body{

background:white;

}

.title,

.panel{

display:none;

}

.cards{

display:block;

}

.student-card{

margin:0 auto 30px auto;

page-break-after:always;

box-shadow:none;

}

}
.container{

width:95%;

max-width:1400px;

margin:auto;

padding:30px;

}

.student-card{

width:420px;

height:720px;

border-radius:35px;

padding:28px;

background:white;

position:relative;

overflow:hidden;

box-shadow:0 10px 25px rgba(0,0,0,.15);

margin:auto;

}

.title{

font-size:50px;

font-weight:bold;

text-align:center;

color:#6b5a50;

margin-bottom:25px;

}
.student-photo{

width:140px;

height:140px;

border-radius:50%;

object-fit:cover;

border:5px solid #eee;

margin:15px auto;

display:block;

}
.panel{

background:white;

padding:25px;

border-radius:25px;

box-shadow:0 5px 20px rgba(0,0,0,.1);

display:flex;

gap:20px;

justify-content:center;

align-items:center;

flex-wrap:wrap;

margin-bottom:35px;

}

button{

background:#b56c68;

color:white;

border:none;

padding:15px 35px;

border-radius:15px;

font-size:22px;

cursor:pointer;

}

button:hover{

opacity:5;

}

.cards{

display:grid;

grid-template-columns:

repeat(auto-fit,460px);

justify-content:center;

gap:60px;

padding:30px;

}

.student-number{

display:flex;

justify-content:center;

align-items:center;

width:fit-content;

margin:12px auto;

padding:8px 18px;

border-radius:20px;

background:rgba(255,255,255,.85);

font-family:'Tajawal',sans-serif;

font-size:18px;

font-weight:800;

color:#8a6358;

box-shadow:0 3px 10px rgba(0,0,0,.08);

}
.student-id{

font-family:'Tajawal',sans-serif;

font-size:22px;

font-weight:800;

color:#b56d67;

text-align:center;

margin:10px 0 5px;

}
.student-card{

width:430px;

height:760px;

margin:20px auto;
border-radius:35px;

padding:28px;

background:white;

position:relative;

overflow:hidden;

box-shadow:0 10px 25px rgba(0,0,0,.15);

margin:auto;

}

.student-card::before{

content:"";

position:absolute;

top:0;

left:0;

width:100%;

height:100%;

background-image:url("images/waterm.jpg");

background-repeat:no-repeat;

background-position:center;

background-size:cover;

opacity:.18;

z-index:0;

}

.student-card>*{

position:relative;

z-index:1;

}

.card-logos{

display:flex;

justify-content:space-between;

}

.card-logos img{

width:80px;

height:80px;

object-fit:contain;

}

.student-photo{

width:150px;

height:150px;

border-radius:50%;

object-fit:cover;

border:5px solid #eee;

margin:20px auto;

display:block;

}

.student-name{

font-family:'Tajawal',sans-serif;

font-size:38px;

font-weight:800;

text-align:center;

color:#5f4c42;

line-height:1.5;

margin:20px 0;

}

.qr-box{

display:flex;

justify-content:center;

margin:20px 0;

}
.qr-text{

font-family:'Tajawal',sans-serif;

font-size:14px;

font-weight:600;

color:#5f4c42;

text-align:center;

margin:10px 0;

line-height:1.4;

}
.link-title{

font-family:'Tajawal',sans-serif;

font-size:13px;

font-weight:700;

color:#6d5b52;

text-align:center;

margin-top:10px;

margin-bottom:5px;

}
.link-box{

width:85%;

margin:10px auto;

padding:8px;

border-radius:15px;

background:rgba(255,255,255,.7);

font-size:12px;

font-weight:600;

text-align:center;

word-break:break-word;

font-family:Arial,sans-serif;

}

.save-btn{

margin-top:18px;

padding:12px 20px;

border:none;

border-radius:20px;

cursor:pointer;

font-size:18px;

font-family:'Tajawal',sans-serif;

font-weight:bold;

background:#8a6358;

color:white;

}

.id-box{

font-size:35px;

font-weight:bold;

margin-top:20px;

color:#b56c68;

}

@media(max-width:700px){

.title{

font-size:35px;

}

.student-name{

font-size:26px;

}

}

</style>

</head>

<body>

<div class="container">

<div class="title">

🏆 منشئ بطاقات منطاق

</div>

<div class="panel">

<input

type="file"

id="excelFile"

accept=".xlsx,.xls"

>

<button

onclick="createCards()">

إنشاء البطاقات

</button>

</div>

<div

id="cardsArea"

class="cards">

</div>



</div>


<script>

function createCards(){

const file=

document.getElementById("excelFile").files[0];

if(!file){

alert("اختر ملف Excel أولاً");

return;

}

const reader=

new FileReader();

reader.onload=function(e){

const data=

new Uint8Array(e.target.result);

const workbook=

XLSX.read(

data,

{

type:"array"

}

);

const sheet=

workbook.Sheets[

workbook.SheetNames[0]

];

const students=

XLSX.utils.sheet_to_json(sheet);

generateCards(students);

};

reader.readAsArrayBuffer(file);

}



function generateCards(students){

const area=

document.getElementById(

"cardsArea"

);

area.innerHTML="";



students.forEach(student=>{



const id=

student.id ||

student.ID;



const name=

student.name ||

student.Name;



const image=

student.image ||

student.Image;



const link=

`https://mintaq26.github.io/mintaq/?id=${id}`;



const card=

document.createElement(

"div"

);



card.className=

"student-card";



card.innerHTML=`

<div class="card-logos">

<img src="images/add.png">

<img src="images/mohammed.png">

</div>

<img

class="student-photo"

src="${image}"

>

<div class="student-number">

رقم الطالب : ${id}

</div>

<div class="student-name">

${name}

</div>

<div class="qr-text">

📱 امسح الرمز للوصول إلى صفحة الطالب

</div>

<div

class="qr-box"

id="qr${id}">

</div>

<div class="link-title">

🔗 أو انسخ الرابط أدناه

</div>


<div class="link-box">

🌐 ${link}

</div>

<button

class="save-btn"

onclick="saveOneCard(this)">

📷 حفظ البطاقة

</button>

`;




area.appendChild(

card

);



new QRCode(

document.getElementById(

`qr${id}`

),

{

text:link,

width:120,

height:120

}

);



});

}
async function saveOneCard(button){

const card=

button.closest(

".student-card"

);

button.style.display="none";

try{

const canvas=

await html2canvas(

card,

{

scale:3,

useCORS:true,

backgroundColor:"#ffffff"

}

);

const studentName=

card.querySelector(

".student-name"

)

.innerText

.trim();

const link=

document.createElement(

"a"

);

link.download=

`${studentName}.png`;

link.href=

canvas.toDataURL(

"image/png"

);

document.body.appendChild(

link

);

link.click();

document.body.removeChild(

link

);

}

catch(error){

alert(

"حدث خطأ أثناء الحفظ"

);

console.log(error);

}

button.style.display="block";

}
</script>

</body>

</html>
